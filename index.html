<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Engine of Us</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;color:#e8e4dc;font-family:Georgia,serif;overflow:hidden}

    .snow{position:fixed;top:-10px;width:2px;height:2px;background:#fff;border-radius:50%;animation:fall linear infinite}
    @keyframes fall{to{transform:translateY(105vh) translateX(-20px)}}

    .text{text-align:center;z-index:2;margin-bottom:4vh}
    h1{font-size:clamp(1.8rem,5vw,3rem);letter-spacing:.08em;font-weight:400}
    .soon{color:#3a3a3a;font-size:.8rem;letter-spacing:.3em;text-transform:uppercase;margin-top:1.4rem}

    .car{width:clamp(300px,60vw,800px);animation:breathe 3s ease-in-out infinite}
    .car img{width:100%;display:block}

    @keyframes breathe{
      0%,100%{filter:brightness(1)}
      50%{filter:brightness(1.2)}
    }

    footer{position:fixed;bottom:2rem;color:#1a1a1a;font-size:.7rem;letter-spacing:.15em;z-index:2}

    .lang{position:fixed;top:2rem;right:2rem;z-index:10}
    .lang a{color:#222;text-decoration:none;font-size:.8rem;transition:color .3s}
    .lang a:hover{color:#ff1a1a}
  </style>
</head>
<body>

  <div class="text">
    <h1>The Engine of Us</h1>
    <p class="soon">Coming Soon</p>
  </div>

  <div class="car">
    <img src="taillight.png" alt="">
  </div>

  <footer>Jesse Luo · 2026</footer>

  <div class="lang"><a href="https://hongmingzhixin.com">中文</a></div>

  <script>
    const b=document.body;for(let i=0;i<70;i++){const s=document.createElement('div');s.className='snow';s.style.left=Math.random()*100+'vw';s.style.animationDuration=2+Math.random()*4+'s';s.style.animationDelay=Math.random()*5+'s';s.style.opacity=.08+Math.random()*.25;s.style.width=s.style.height=1+Math.random()*2+'px';b.appendChild(s)}
  </script>
</body>
</html>
